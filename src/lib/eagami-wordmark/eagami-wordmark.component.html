<a
  class="ea-eagami-wordmark"
  [class.ea-eagami-wordmark--inline]="layout() === 'inline'"
  href="https://eagami.com"
  target="_blank"
  rel="noopener"
  [attr.aria-label]="ariaLabel()">
  <ea-icon-eagami
    class="ea-eagami-wordmark__logo"
    aria-hidden="true" />

  <span class="ea-eagami-wordmark__text">
    @if (showOverline()) {
      <span class="ea-eagami-wordmark__overline">handcrafted by</span>
    }
    <span class="ea-eagami-wordmark__brand">{{ brandText() }}</span>
    @if (showTagline()) {
      @if (layout() === 'inline') {
        <span
          class="ea-eagami-wordmark__separator"
          aria-hidden="true">
          —
        </span>
      }
      <span class="ea-eagami-wordmark__tagline">elegant web design</span>
    }
  </span>
</a>
