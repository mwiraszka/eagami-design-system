@if (toastService.toasts().length) {
  <div
    class="ea-toast-container"
    aria-live="polite"
    aria-atomic="false">
    @for (toast of toastService.toasts(); track toast.id) {
      <div
        class="ea-toast ea-toast--{{ toast.variant }}"
        role="status">
        <span class="ea-toast__message">{{ toast.message }}</span>
        <button
          class="ea-toast__close"
          type="button"
          aria-label="Dismiss"
          (click)="toastService.dismiss(toast.id)">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <line
              x1="18"
              y1="6"
              x2="6"
              y2="18" />
            <line
              x1="6"
              y1="6"
              x2="18"
              y2="18" />
          </svg>
        </button>
      </div>
    }
  </div>
}
