<div
  class="ea-card"
  [ngClass]="hostClasses()">
  <div
    class="ea-card__header"
    [style.text-align]="headerAlign()">
    <ng-content select="[eaCardHeader]" />
  </div>

  @if (headerDivider()) {
    <ea-divider class="ea-card__divider" />
  }

  <div class="ea-card__body">
    <ng-content />
  </div>

  <div class="ea-card__footer">
    <ng-content select="[eaCardFooter]" />
  </div>
</div>
