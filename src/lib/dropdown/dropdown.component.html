<div class="ea-dropdown-field">
  @if (label()) {
    <label
      class="ea-dropdown-field__label"
      [for]="id()"
      [class.ea-dropdown-field__label--required]="required()">
      {{ label() }}
    </label>
  }

  <div class="ea-dropdown">
    <button
      #triggerEl
      type="button"
      class="ea-dropdown__trigger"
      [ngClass]="triggerClasses()"
      [id]="id()"
      [disabled]="isDisabled()"
      [attr.aria-expanded]="isOpen()"
      [attr.aria-haspopup]="'listbox'"
      [attr.aria-labelledby]="label() ? id() : null"
      (click)="toggle()"
      (keydown)="handleKeydown($event)">
      <span
        class="ea-dropdown__value"
        [class.ea-dropdown__value--placeholder]="!selectedLabel()">
        {{ selectedLabel() || placeholder() }}
      </span>
      <ea-icon-chevron-down
        class="ea-dropdown__chevron"
        [class.ea-dropdown__chevron--open]="isOpen()" />
    </button>

    @if (isOpen()) {
      <ul
        class="ea-dropdown__menu"
        role="listbox"
        [attr.aria-activedescendant]="
          focusedIndex() >= 0 ? id() + '-option-' + focusedIndex() : null
        ">
        @for (option of options(); track option.value; let i = $index) {
          <li
            class="ea-dropdown__option"
            [class.ea-dropdown__option--selected]="option.value === value()"
            [class.ea-dropdown__option--focused]="i === focusedIndex()"
            [class.ea-dropdown__option--disabled]="option.disabled"
            [id]="id() + '-option-' + i"
            role="option"
            [attr.aria-selected]="option.value === value()"
            [attr.aria-disabled]="option.disabled || null"
            (click)="select(option)"
            (mouseenter)="focusedIndex.set(i)">
            {{ option.label }}
          </li>
        }
      </ul>
    }
  </div>

  @if (showError()) {
    <p
      class="ea-dropdown-field__message ea-dropdown-field__message--error"
      [id]="id() + '-error'"
      role="alert">
      {{ errorMsg() }}
    </p>
  }

  @if (showHint()) {
    <p
      class="ea-dropdown-field__message ea-dropdown-field__message--hint"
      [id]="id() + '-hint'">
      {{ hint() }}
    </p>
  }
</div>
