<div
  class="ea-spinner"
  [ngClass]="hostClasses()"
  role="status">
  <svg
    class="ea-spinner__circle"
    viewBox="0 0 24 24"
    fill="none"
    aria-hidden="true">
    <circle
      cx="12"
      cy="12"
      r="10"
      stroke="currentColor"
      stroke-width="3"
      opacity="0.25" />
    <path
      d="M12 2a10 10 0 0 1 10 10"
      stroke="currentColor"
      stroke-width="3"
      stroke-linecap="round" />
  </svg>
  <span class="ea-spinner__label">{{ label() }}</span>
</div>
