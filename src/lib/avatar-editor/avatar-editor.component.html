<div
  class="ea-avatar-editor"
  [ngClass]="hostClasses()">
  <input
    #fileInputEl
    type="file"
    class="ea-avatar-editor__file-input"
    [accept]="accept()"
    (change)="onFileSelected($event)" />

  @if (!hasImage() && !isLoading()) {
    <button
      type="button"
      class="ea-avatar-editor__dropzone"
      [style.width.px]="canvasSize()"
      [style.height.px]="canvasSize()"
      (click)="openFilePicker()"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)">
      <ea-icon-upload class="ea-avatar-editor__upload-icon" />
      <span class="ea-avatar-editor__dropzone-text"> Drop image or click to upload </span>
    </button>
  }

  @if (hasImage() || isLoading()) {
    <div
      class="ea-avatar-editor__canvas-wrapper"
      [style.width.px]="canvasSize()"
      [style.height.px]="canvasSize()"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)">
      @if (isLoading()) {
        <ea-skeleton
          [variant]="shape() === 'circle' ? 'circle' : 'rect'"
          [width]="canvasSize() + 'px'"
          [height]="canvasSize() + 'px'" />
      }

      @if (hasImage()) {
        <canvas
          #canvasEl
          class="ea-avatar-editor__canvas"
          [style.display]="isLoading() ? 'none' : 'block'"
          [width]="canvasSize()"
          [height]="canvasSize()"
          (mousedown)="onMouseDown($event)"
          (touchstart)="onTouchStart($event)"></canvas>

        @if (!isLoading()) {
          <div class="ea-avatar-editor__canvas-overlay">
            <ea-icon-camera class="ea-avatar-editor__overlay-icon" />
            <span>Change photo</span>
          </div>
        }
      }
    </div>
  }

  <div class="ea-avatar-editor__controls">
    <button
      type="button"
      class="ea-avatar-editor__icon-btn"
      [eaTooltip]="'Revert to original'"
      aria-label="Revert to original"
      [disabled]="!canRevert() || isLoading()"
      (click)="revertImage()">
      <ea-icon-rotate-ccw />
    </button>

    <button
      type="button"
      class="ea-avatar-editor__icon-btn"
      [eaTooltip]="'Zoom out'"
      aria-label="Zoom out"
      [disabled]="!hasImage() || isLoading() || zoom() <= minZoom()"
      (click)="setZoom(zoom() - 0.1)">
      <ea-icon-minus />
    </button>

    <input
      type="range"
      class="ea-avatar-editor__zoom-slider"
      [min]="minZoom()"
      [max]="maxZoom()"
      step="0.01"
      [value]="zoom()"
      [disabled]="!hasImage() || isLoading()"
      aria-label="Zoom"
      (input)="onZoomInput($event)" />

    <button
      type="button"
      class="ea-avatar-editor__icon-btn"
      [eaTooltip]="'Zoom in'"
      aria-label="Zoom in"
      [disabled]="!hasImage() || isLoading() || zoom() >= maxZoom()"
      (click)="setZoom(zoom() + 0.1)">
      <ea-icon-plus />
    </button>

    <button
      type="button"
      class="ea-avatar-editor__icon-btn ea-avatar-editor__icon-btn--danger"
      [eaTooltip]="'Remove image'"
      aria-label="Remove image"
      [disabled]="!hasImage() || isLoading()"
      (click)="removeImage()">
      <ea-icon-trash />
    </button>
  </div>
</div>
