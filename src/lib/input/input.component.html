<div class="ea-input-field">
  @if (label()) {
    <label
      class="ea-input-field__label"
      [for]="id()"
      [class.ea-input-field__label--required]="required()">
      {{ label() }}
    </label>
  }

  <div
    class="ea-input-wrapper"
    [ngClass]="wrapperClasses()">
    <!-- Prefix slot (icon or text) -->
    <span class="ea-input-wrapper__prefix">
      <ng-content select="[slot=prefix]" />
    </span>

    <input
      #inputEl
      class="ea-input"
      [id]="id()"
      [type]="effectiveType()"
      [placeholder]="placeholder()"
      [disabled]="isDisabled()"
      [readOnly]="readonly()"
      [required]="required()"
      [value]="value()"
      [attr.autocomplete]="autocomplete() ?? null"
      [attr.aria-invalid]="resolvedStatus() === 'error' || null"
      [attr.aria-describedby]="
        showError() ? id() + '-error' : showHint() ? id() + '-hint' : null
      "
      (input)="handleInput($event)"
      (focus)="handleFocus($event)"
      (blur)="handleBlur($event)" />

    <!-- Suffix slot (icon, clear button, etc.) -->
    <span class="ea-input-wrapper__suffix">
      <ng-content select="[slot=suffix]" />
    </span>

    <!-- Built-in password visibility toggle -->
    @if (type() === 'password' && showPasswordToggle()) {
      <button
        type="button"
        class="ea-input-wrapper__password-toggle"
        [attr.aria-label]="passwordVisible() ? 'Hide password' : 'Show password'"
        [attr.aria-pressed]="passwordVisible()"
        (click)="togglePasswordVisibility()"
        tabindex="-1">
        @if (passwordVisible()) {
          <ea-icon-eye-off />
        } @else {
          <ea-icon-eye />
        }
      </button>
    }
  </div>

  @if (showError()) {
    <p
      class="ea-input-field__message ea-input-field__message--error"
      [id]="id() + '-error'"
      role="alert">
      <ea-icon-alert-circle class="ea-input-field__message-icon" />
      {{ errorMsg() }}
    </p>
  }

  @if (showHint()) {
    <p
      class="ea-input-field__message ea-input-field__message--hint"
      [id]="id() + '-hint'">
      {{ hint() }}
    </p>
  }
</div>
